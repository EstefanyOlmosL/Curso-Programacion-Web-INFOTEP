<!DOCTYPE html>

    <title>Atributos de enlaces</title>
</head>
<body>
    
    <!--Un enlace absoluto-->

    <h1>Tipos de atributos de enlaces</h1>
<div>
     <h2> Un enlace que abra en nueva pestaña
</h2>
    <a href="https://www.youtube.com" target="_blank">Ir a Google</a>
</div>
   
<div>
    <h2>Un enlace con atributo title</h2>
     <a href="https://www.youtube.com" target="_blank" title="Buscar en Youtube">Ir a Youtube </a>
</div>

<div>
    <h2>Un enlace con rel</h2>
     <a href="https://www.youtube.com" rel= "nooper norreferrer">Ir a Youtube</a>
</div>
<div>
    <h2>UUn enlace de descarga</h2>
     <a href="archivo.pdf" download>Descargar</a>
</div>

</body>
