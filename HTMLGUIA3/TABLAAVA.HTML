<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tabla Avanzada</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    table {
      border-collapse: collapse;
      width: 300px;
    }

    th, td {
      border: 1px solid black;
      padding: 8px;
      text-align: left;
    }

    th {
      background-color: #f2f2f2;
    }

    tfoot {
      font-weight: bold;
      background-color: #ddd;
    }
  </style>

</head>
<body>

  <h2>Ejemplo de Tablas Avanzadas</h2>

  <table>
    <thead>
      <tr>
        <th>Producto</th>
        <th>Precio</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>Bicicleta MTB</td>
        <td>$500</td>
      </tr>
      <tr>
        <td>Bicicleta Ruta</td>
        <td>$700</td>
      </tr>
    </tbody>

    <tfoot>
      <tr>
        <td>Total</td>
        <td>$1200</td>
      </tr>
    </tfoot>
  </table>

</body>
</html>
