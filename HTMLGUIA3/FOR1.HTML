<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario de Práctica</title>
</head>
<body>

  <h1>Formulario de Registro</h1>

  <form>

    <!-- Campo de texto -->
    <label for="nombre">Nombre:</label><br>
    <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre" required maxlength="30">
    <br><br>

    <!-- Campo de correo -->
    <label for="correo">Correo electrónico:</label><br>
    <input type="email" id="correo" name="correo" required>
    <br><br>

    <!-- Campo de contraseña -->
    <label for="clave">Contraseña:</label><br>
    <input type="password" id="clave" name="clave">
    <br><br>

    <!-- Campo numérico -->
    <label for="edad">Edad:</label><br>
    <input type="number" id="edad" name="edad" min="10" max="100">
    <br><br>

    <!-- Campo de fecha -->
    <label for="fecha">Fecha de nacimiento:</label><br>
    <input type="date" id="fecha" name="fecha">
    <br><br>

    <!-- Radio (selección única) -->
    <label>Género:</label><br>
    <input type="radio" name="genero" value="masculino"> Masculino<br>
    <input type="radio" name="genero" value="femenino"> Femenino<br>
    <br>

    <!-- Checkbox (selección múltiple) -->
    <label>Intereses:</label><br>
    <input type="checkbox" name="intereses" value="deporte"> Deporte<br>
    <input type="checkbox" name="intereses" value="musica"> Música<br>
    <input type="checkbox" name="intereses" value="tecnologia"> Tecnología<br>
    <br>

    <!-- Campo solo lectura -->
    <label for="pais">País:</label><br>
    <input type="text" id="pais" name="pais" value="República Dominicana" readonly>
    <br><br>

    <!-- Campo deshabilitado -->
    <label for="codigo">Código:</label><br>
    <input type="text" id="codigo" name="codigo" value="12345" disabled>
    <br><br>

    <!-- Botón de envío -->
    <input type="submit" value="Enviar formulario">

  </form>

</body>
</html>
