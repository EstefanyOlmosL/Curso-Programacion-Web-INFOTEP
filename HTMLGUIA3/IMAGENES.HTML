<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Imágenes en HTML</title>
</head>
<body>

  <h1>Ejemplo de imágenes</h1>

  <!-- Imagen 1 -->
  <h2>Imagen simple</h2>
  <img 
    src="imagen1.jpg" 
    alt="Paisaje natural con montañas" 
    width="400" 
    height="250" 
    title="Imagen de paisaje">

  <!-- Imagen 2 con figure -->
  <h2>Imagen con descripción</h2>
  <figure>
    <img 
      src="imagen2.png" 
      alt="Logo de tecnología" 
      width="300" 
      height="200" 
      title="Logo tecnológico">
    <figcaption>Este es un ejemplo de un logo tecnológico</figcaption>
  </figure>

</body>
</html>
